name: Paid deployment / custom support
description: Request paid help for deployment, customization, or production debugging
title: "[Paid support]: "
labels: ["paid support"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for legitimate paid Cloudflare deployment, customization, migration, or troubleshooting work.

        Do not include Cloudflare tokens, SMTP credentials, API keys, email contents, private domain records, cookies, or other secrets. If sensitive details are required, share only after a paid scope and safe handoff method are agreed.
  - type: input
    id: contact
    attributes:
      label: Contact
      description: Email, Telegram, Discord, or another way to reach you.
      placeholder: name@example.com
    validations:
      required: true
  - type: input
    id: budget
    attributes:
      label: Budget
      description: Your expected budget or range.
      placeholder: "Example: $20-$100"
    validations:
      required: true
  - type: input
    id: timeline
    attributes:
      label: Timeline
      description: When do you need this completed?
      placeholder: "Example: today / this week"
    validations:
      required: true
  - type: dropdown
    id: request_type
    attributes:
      label: What do you need?
      options:
        - Deploy this project
        - Fix a production issue
        - Add or customize a feature
        - Configure SMTP / IMAP / Telegram Bot
        - Configure Cloudflare D1 / R2 / Pages / Workers
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe the task, expected result, current deployment state, and any public error messages.
      placeholder: |
        Current state:
        Target result:
        Error logs or screenshots:
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance checklist
      description: How should the work be verified?
      placeholder: |
        - Worker deploys successfully
        - Temporary mailbox can receive mail
        - Admin page opens with the configured domain
    validations:
      required: false
